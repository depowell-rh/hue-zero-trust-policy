---
- name: List for webhook
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Detect Configuration Drift
      condition: event.payload.state.xy != [0.409, 0.518]
      action:
        run_job_template:
          name: "Policy-Enforcement-Green"

  
